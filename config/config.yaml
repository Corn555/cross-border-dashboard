# config.yaml — 全局 YAML 配置文件
# 修改此文件后重启 python main.py 即可生效。
# 如文件不存在，自动使用 src/config/config.py 中的默认值。

paths:
  raw_data: "data/raw/sales.csv"
  processed_dir: "data/processed"
  processed_data: "data/processed/sales_clean.csv"
  charts_dir: "output/charts"
  reports_dir: "output/reports"
  report_output: "output/reports/report.html"

project:
  name: "跨境电商销售数据分析平台"
  version: "3.1.0"

charts:
  figure_size: [12, 6]
  dpi: 120
  font_family: "Microsoft YaHei"
